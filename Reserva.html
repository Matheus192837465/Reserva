<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Reservas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light p-4">

<div class="container">
  <h4>Nova Reserva</h4>

  <input type="date" id="data" class="form-control mb-3" onchange="carregar()">

  <div id="horarios" class="mb-3"></div>

  <input id="nome" class="form-control mb-2" placeholder="Nome">
  <input id="id" class="form-control mb-3" placeholder="ID">

  <button class="btn btn-success" onclick="confirmar()">Confirmar</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyfRPXOwc_5o3KjPDY6usuuKYW_dAINMLjnlYhGryzdBoDhOJh8lF3Nm8I-RUIwf9f6/exec";

if(!localStorage.getItem("tipo")) location.href="login.html";

function carregar(){
  fetch(`${API_URL}?action=horarios&data=${data.value}`)
  .then(r=>r.json())
  .then(h=>{
    horarios.innerHTML="";
    h.forEach(x=>{
      horarios.innerHTML+=`
        <div>
          <input type="checkbox" value="${x}"> ${x}
        </div>`;
    });
  });
}

function confirmar(){
  const sel=[...document.querySelectorAll("input[type=checkbox]:checked")].map(c=>c.value);
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"reservar",
      data:data.value,
      horarios:sel,
      nome:nome.value,
      id:id.value
    })
  })
  .then(r=>r.json())
  .then(r=>{
    if(r.sucesso){alert("Reserva feita");location.reload();}
    else alert(r.msg);
  });
}
</script>

</body>
</html>
