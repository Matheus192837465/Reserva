<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login | Reservas</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d6efd, #6610f2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 380px;
      border-radius: 15px;
    }

    .eye {
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="card shadow">
  <div class="card-body p-4">

    <h4 class="text-center mb-4">Acesso ao Sistema</h4>

    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <input type="text" id="usuario" class="form-control" placeholder="Digite seu usuário">
    </div>

    <div class="mb-3">
      <label class="form-label">Senha</label>
      <div class="input-group">
        <input type="password" id="senha" class="form-control" placeholder="Digite sua senha">
        <span class="input-group-text eye" onclick="toggleSenha()">👁️</span>
      </div>
    </div>

    <div class="d-grid">
      <button class="btn btn-primary" onclick="login()">ENTRAR</button>
    </div>

    <div id="msg" class="text-danger text-center mt-3" style="display:none;"></div>

  </div>
</div>

<script>
function toggleSenha() {
  const s = document.getElementById("senha");
  s.type = s.type === "password" ? "text" : "password";
}

function login() {
  const usuario = document.getElementById("usuario").value.trim();
  const senha = document.getElementById("senha").value.trim();
  const msg = document.getElementById("msg");

  msg.style.display = "none";

  if (!usuario || !senha) {
    msg.innerText = "Preencha todos os campos";
    msg.style.display = "block";
    return;
  }

  // USUÁRIOS FIXOS (POR ENQUANTO)
  if (usuario === "admin" && senha === "123456") {
    localStorage.setItem("tipo", "admin");
    window.location.href = "admin.html";
    return;
  }

  if (usuario === "user" && senha === "123456") {
    localStorage.setItem("tipo", "user");
    window.location.href = "home.html";
    return;
  }

  msg.innerText = "Usuário ou senha inválidos";
  msg.style.display = "block";
}
</script>

</body>
</html>
