<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reservas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4" id="login">
    <h4>Login</h4>
    <input id="usuario" class="form-control mb-2" placeholder="Usuário">
    <input id="senha" type="password" class="form-control mb-2" placeholder="Senha">
    <button class="btn btn-primary w-100" onclick="logar()">Entrar</button>
  </div>

  <div class="card p-4 d-none" id="app">
    <h4>Nova Reserva</h4>
    <input type="date" id="data" class="form-control mb-2">
    <div id="horarios" class="mb-2"></div>
    <input id="nome" class="form-control mb-2" placeholder="Nome">
    <input id="id" class="form-control mb-2" placeholder="ID">
    <button class="btn btn-success w-100" onclick="reservar()">Confirmar</button>
  </div>

  <div class="card p-4 mt-4 d-none" id="admin">
    <h4>Painel Admin</h4>
    <table class="table table-bordered">
      <thead><tr><th>Data</th><th>Hora</th><th>Nome</th><th>Ação</th></tr></thead>
      <tbody id="lista"></tbody>
    </table>
  </div>
</div>

<script>
const API="COLE_SUA_URL_AQUI";
let tipo="";

function logar(){
  fetch(API,{method:"POST",body:JSON.stringify({
    action:"login",usuario:usuario.value,senha:senha.value
  })})
  .then(r=>r.json()).then(res=>{
    if(!res.sucesso) return alert("Login inválido");
    login.classList.add("d-none");
    app.classList.remove("d-none");
    tipo=res.tipo;
    if(tipo==="admin"){ admin.classList.remove("d-none"); carregarAdmin(); }
  });
}

data.onchange=()=>{
  fetch(`${API}?action=horarios&data=${data.value}`)
  .then(r=>r.json()).then(h=>{
    horarios.innerHTML="";
    h.forEach(x=>{
      horarios.innerHTML+=`
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="${x}">
        <label class="form-check-label">${x}</label>
      </div>`;
    });
  });
};

function reservar(){
  const hs=[...document.querySelectorAll("#horarios input:checked")].map(c=>c.value);
  fetch(API,{method:"POST",body:JSON.stringify({
    action:"reservar",data:data.value,horarios:hs,nome:nome.value,id:id.value
  })})
  .then(r=>r.json()).then(r=>alert(r.sucesso?"Reservado":r.msg));
}

function carregarAdmin(){
  fetch(`${API}?action=listar`).then(r=>r.json()).then(d=>{
    lista.innerHTML="";
    d.forEach(l=>{
      lista.innerHTML+=`
      <tr>
        <td>${l[1]}</td><td>${l[2]}</td><td>${l[3]}</td>
        <td><button class="btn btn-danger btn-sm"
        onclick="cancelar('${l[0]}')">X</button></td>
      </tr>`;
    });
  });
}

function cancelar(ch){
  fetch(API,{method:"POST",body:JSON.stringify({action:"cancelar",chave:ch})})
  .then(()=>carregarAdmin());
}
</script>

</body>
</html>
