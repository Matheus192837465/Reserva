<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 350px;">
    <h4 class="text-center mb-3">Sistema de Reservas</h4>

    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <input type="text" id="usuario" class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Senha</label>
      <div class="input-group">
        <input type="password" id="senha" class="form-control">
        <button class="btn btn-outline-secondary" type="button" onclick="toggleSenha()">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>

    <button class="btn btn-primary w-100" onclick="login()">Entrar</button>

    <div id="msg" class="text-danger text-center mt-2"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
