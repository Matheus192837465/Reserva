<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow mx-auto" style="max-width:400px;">
    <div class="card-body">
      <h4 class="text-center mb-4">🔐 Login</h4>

      <input id="usuario" class="form-control mb-3" placeholder="Usuário">
      <input id="senha" type="password" class="form-control mb-3" placeholder="Senha">

      <button class="btn btn-primary w-100" onclick="entrar()">Entrar</button>

      <div id="erro" class="text-danger mt-3 text-center" style="display:none;">
        Usuário ou senha inválidos
      </div>
    </div>
  </div>
</div>

<script>
function entrar() {
  const usuario = document.getElementById("usuario").value;
  const senha = document.getElementById("senha").value;

  google.script.run.withSuccessHandler(res => {
    if (!res.sucesso) {
      document.getElementById("erro").style.display = "block";
      return;
    }

    if (res.tipo === "admin") {
      window.location.href = "admin.html";
    } else {
      window.location.href = "reserva.html";
    }
  }).login(usuario, senha);
}
</script>

</body>
</html>
