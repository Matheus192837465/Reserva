<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f6fa; }
.login-box {
  max-width: 380px;
  margin:auto;
  margin-top:10%;
}
</style>
</head>

<body>

<div class="login-box card shadow p-4">
  <h4 class="text-center mb-4">🔐 Login</h4>

  <form id="formLogin">
    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <input type="text" id="usuario" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Senha</label>
      <div class="input-group">
        <input type="password" id="senha" class="form-control" required>
        <button class="btn btn-outline-secondary" type="button" onclick="toggleSenha()">👁</button>
      </div>
    </div>

    <div class="d-grid">
      <button class="btn btn-primary">ENTRAR</button>
    </div>
  </form>

  <div id="msg" class="text-danger text-center mt-3"></div>
</div>

<script>
/* 🔴 COLE A URL DO SEU BACKEND AQUI */
const API_URL = "https://script.google.com/macros/s/AKfycbwCb3onquV3jG70a8ca1yDJrUCS2v50Tp8iCz7Lpju4f8NY72Na7i46Q3sWVNbNi4_5/exec";

/* Mostrar / ocultar senha */
function toggleSenha() {
  const s = document.getElementById("senha");
  s.type = s.type === "password" ? "text" : "password";
}

/* LOGIN */
document.getElementById("formLogin").addEventListener("submit", function(e){
  e.preventDefault();

  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "login",
      usuario: document.getElementById("usuario").value,
      senha: document.getElementById("senha").value
    })
  })
  .then(r => r.json())
  .then(res => {
    if (res.sucesso) {
      localStorage.setItem("tipo", res.tipo);
      window.location.href = "index.html";
    } else {
      document.getElementById("msg").innerText = "❌ Usuário ou senha inválidos";
    }
  })
  .catch(() => {
    document.getElementById("msg").innerText = "Erro de conexão";
  });
});
</script>

</body>
</html>
