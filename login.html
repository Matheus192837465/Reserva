<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

</head>
<body class="bg-light d-flex justify-content-center align-items-center" style="height:100vh">

<div class="card shadow p-4" style="width:350px">
  <h4 class="text-center mb-3">Login</h4>

  <input id="usuario" class="form-control mb-2" placeholder="Usuário">

  <div class="input-group mb-3">
    <input id="senha" type="password" class="form-control" placeholder="Senha">
    <button class="btn btn-outline-secondary" onclick="toggle()">
      <i id="icon" class="bi bi-eye"></i>
    </button>
  </div>

  <button class="btn btn-primary w-100" onclick="entrar()">Entrar</button>

  <div id="msg" class="text-danger text-center mt-2"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwCb3onquV3jG70a8ca1yDJrUCS2v50Tp8iCz7Lpju4f8NY72Na7i46Q3sWVNbNi4_5/exec";

function toggle(){
  const s = document.getElementById("senha");
  const i = document.getElementById("icon");
  s.type = s.type === "password" ? "text" : "password";
  i.classList.toggle("bi-eye");
  i.classList.toggle("bi-eye-slash");
}

function entrar(){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      usuario:usuario.value,
      senha:senha.value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    if(!d.sucesso){
      msg.innerText="Usuário ou senha inválidos";
      return;
    }
    location.href = d.tipo === "admin" ? "admin.html" : "reserva.html";
  });
}
</script>

</body>
</html>
