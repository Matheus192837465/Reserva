<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Horários do Dia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      background: #f4f6f9;
    }

    .horario {
      cursor: pointer;
      transition: background .2s;
    }

    .horario:hover {
      background: #e9ecef;
    }
  </style>
</head>
<body>

<div class="container mt-4">
  <a href="home.html" class="btn btn-secondary mb-3">Voltar</a>

  <h4 id="titulo"></h4>

  <div id="lista" class="list-group mt-3"></div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalReserva" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Nova Reserva</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <p id="infoHorario" class="fw-semibold"></p>

        <div class="mb-3">
          <label class="form-label">Nome</label>
          <input type="text" id="nome" class="form-control">
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancelar
        </button>
        <button class="btn btn-primary" onclick="confirmarReserva()">
          Confirmar
        </button>
      </div>

    </div>
  </div>
</div>

<script>
let horarioSelecionado = "";
let dataSelecionada = "";

function getData() {
  const params = new URLSearchParams(window.location.search);
  return params.get("data");
}

function gerarHorarios() {
  const horarios = [];
  let h = 8, m = 0;

  while (h < 18) {
    horarios.push(
      String(h).padStart(2, "0") + ":" +
      String(m).padStart(2, "0")
    );

    m += 15;
    if (m === 60) {
      m = 0;
      h++;
    }
  }
  return horarios;
}

function renderizar() {
  dataSelecionada = getData();
  if (!dataSelecionada) return;

  const [y, m, d] = dataSelecionada.split("-");
  const data = new Date(y, m - 1, d);

  document.getElementById("titulo").innerText =
    data.toLocaleDateString("pt-BR", {
      weekday: "long",
      day: "2-digit",
      month: "long",
      year: "numeric"
    });

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  gerarHorarios().forEach(h => {
    const div = document.createElement("div");
    div.className = "list-group-item horario";
    div.innerText = h + " - Disponível";

    div.onclick = () => abrirModal(h);

    lista.appendChild(div);
  });
}

function abrirModal(horario) {
  horarioSelecionado = horario;
  document.getElementById("nome").value = "";
  document.getElementById("infoHorario").innerText =
    `Horário: ${horarioSelecionado}`;

  const modal = new bootstrap.Modal(
    document.getElementById("modalReserva")
  );
  modal.show();
}

function confirmarReserva() {
  const nome = document.getElementById("nome").value.trim();

  if (!nome) {
    alert("Informe o nome");
    return;
  }

  alert(
    "Reserva simulada:\n" +
    "Data: " + dataSelecionada + "\n" +
    "Horário: " + horarioSelecionado + "\n" +
    "Nome: " + nome
  );

  bootstrap.Modal.getInstance(
    document.getElementById("modalReserva")
  ).hide();
}

renderizar();
</script>

</body>
</html>
