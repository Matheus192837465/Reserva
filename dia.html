<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Horários do Dia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }
    .horario {
      cursor: pointer;
    }
    .horario:hover {
      background: #e9ecef;
    }
  </style>
</head>
<body>

<div class="container mt-4">
  <a href="home.html" class="btn btn-secondary mb-3">Voltar</a>
  <h4 id="titulo"></h4>

  <div id="lista" class="list-group mt-3"></div>
</div>

<script>
function obterDataURL() {
  const params = new URLSearchParams(window.location.search);
  const dataStr = params.get("data");

  if (!dataStr) return null;

  const partes = dataStr.split("-");
  return new Date(
    partes[0],
    partes[1] - 1,
    partes[2],
    12, 0, 0
  );
}

function formatarTitulo(data) {
  return data.toLocaleDateString("pt-BR", {
    weekday: "long",
    day: "2-digit",
    month: "long",
    year: "numeric"
  });
}

function renderizarHorarios() {
  const data = obterDataURL();
  if (!data) return;

  document.getElementById("titulo").innerText = formatarTitulo(data);

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const horarios = [
    "08:00","09:00","10:00","11:00",
    "13:00","14:00","15:00","16:00"
  ];

  horarios.forEach(h => {
    lista.innerHTML += `
      <div class="list-group-item horario">
        ${h} - Disponível
      </div>
    `;
  });
}

renderizarHorarios();
</script>

</body>
</html>
