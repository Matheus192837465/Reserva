<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Reservas do Dia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }
    .hora-box {
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: all .15s;
    }
    .hora-box:hover {
      background: #f1f3f5;
    }
    .hora-box.ocupado {
      background: #e9ecef;
      color: #6c757d;
      cursor: not-allowed;
    }
    .hora {
      font-weight: 600;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand">Reservas do Dia</span>
    <button class="btn btn-outline-light btn-sm" onclick="voltar()">Voltar</button>
  </div>
</nav>

<div class="container mt-4">
  <h5 id="tituloDia" class="mb-3"></h5>

  <div id="horarios" class="row gy-2"></div>

  <div class="d-grid mt-4">
    <button class="btn btn-success" onclick="confirmar()">Confirmar Reserva</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const dataStr = params.get("data");

function parseDataLocal(dataStr) {
  const [y,m,d] = dataStr.split("-").map(Number);
  return new Date(y, m-1, d);
}

const data = parseDataLocal(dataStr);

document.getElementById("tituloDia").innerText =
  data.toLocaleDateString("pt-BR", {
    weekday: "long",
    day: "2-digit",
    month: "long",
    year: "numeric"
  }).replace("-feira","").toUpperCase();

function gerarHorarios() {
  const h = [];
  let hh = 7, mm = 0;
  while (hh < 18 || (hh === 18 && mm === 0)) {
    h.push(String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0"));
    mm += 15;
    if (mm === 60) { mm = 0; hh++; }
  }
  return h;
}

function carregarHorarios() {
  fetch(`https://script.google.com/macros/s/AKfycbyfRPXOwc_5o3KjPDY6usuuKYW_dAINMLjnlYhGryzdBoDhOJh8lF3Nm8I-RUIwf9f6/exec?action=horarios&data=${dataStr}`)
    .then(r => r.json())
    .then(livres => {
      const todos = gerarHorarios();
      const container = document.getElementById("horarios");
      container.innerHTML = "";

      todos.forEach(h => {
        const livre = livres.includes(h);

        const col = document.createElement("div");
        col.className = "col-6 col-md-3";

        col.innerHTML = `
          <label class="hora-box ${livre ? "" : "ocupado"}">
            <input type="checkbox" value="${h}" ${livre ? "" : "disabled"} hidden>
            <div class="hora">${h}</div>
            <small>${livre ? "Disponível" : "Ocupado"}</small>
          </label>
        `;

        col.onclick = () => {
          const cb = col.querySelector("input");
          if (!cb.disabled) cb.checked = !cb.checked;
        };

        container.appendChild(col);
      });
    });
}

function confirmar() {
  const selecionados = [...document.querySelectorAll("input:checked")]
    .map(i => i.value);

  if (selecionados.length === 0) {
    alert("Selecione pelo menos um horário");
    return;
  }

  alert("Horários selecionados:\n" + selecionados.join(", "));
  // Aqui depois ligamos com salvarReserva
}

function voltar() {
  window.location.href = "home.html";
}

carregarHorarios();
</script>

</body>
</html>
