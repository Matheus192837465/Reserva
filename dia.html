<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Horários do Dia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }

    .horario {
      cursor: pointer;
      transition: background .2s;
    }

    .horario:hover {
      background: #e9ecef;
    }
  </style>
</head>
<body>

<div class="container mt-4">
  <a href="home.html" class="btn btn-secondary mb-3">Voltar</a>

  <h4 id="titulo"></h4>

  <div id="lista" class="list-group mt-3"></div>
</div>

<script>
function getData() {
  const params = new URLSearchParams(window.location.search);
  const d = params.get("data");
  if (!d) return null;

  const [y, m, day] = d.split("-");
  return new Date(y, m - 1, day);
}

function gerarHorarios() {
  const horarios = [];
  let h = 8;
  let m = 0;

  while (h < 18) {
    horarios.push(
      String(h).padStart(2, "0") + ":" +
      String(m).padStart(2, "0")
    );

    m += 15;
    if (m === 60) {
      m = 0;
      h++;
    }
  }
  return horarios;
}

function renderizar() {
  const data = getData();
  if (!data) return;

  document.getElementById("titulo").innerText =
    data.toLocaleDateString("pt-BR", {
      weekday: "long",
      day: "2-digit",
      month: "long",
      year: "numeric"
    });

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  gerarHorarios().forEach(h => {
    lista.innerHTML += `
      <div class="list-group-item horario">
        ${h} - Disponível
      </div>
    `;
  });
}

renderizar();
</script>

</body>
</html>
