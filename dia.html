<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Reservas do Dia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }
    .hora-card {
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .hora-card:hover {
      transform: scale(1.02);
      box-shadow: 0 .5rem 1rem rgba(0,0,0,.15);
    }
    .hora {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .ocupado {
      background: #e9ecef;
      color: #6c757d;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand">Reservas do dia</span>
    <button class="btn btn-outline-light btn-sm" onclick="voltar()">Voltar</button>
  </div>
</nav>

<div class="container mt-4">
  <h5 id="tituloDia" class="mb-3"></h5>
  <div id="listaHorarios" class="row gy-3"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const dataStr = params.get("data");

function parseDataLocal(dataStr) {
  const [ano, mes, dia] = dataStr.split("-").map(Number);
  return new Date(ano, mes - 1, dia);
}

const data = parseDataLocal(dataStr);

function formatarData(d) {
  return d.toLocaleDateString("pt-BR", {
    weekday: "long",
    day: "2-digit",
    month: "long",
    year: "numeric"
  });
}

document.getElementById("tituloDia").innerText =
  formatarData(data).replace("-feira", "").toUpperCase();

function gerarHorarios() {
  const horarios = [];
  let h = 7;
  let m = 0;

  while (h < 18 || (h === 18 && m === 0)) {
    horarios.push(
      String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0")
    );
    m += 15;
    if (m === 60) {
      m = 0;
      h++;
    }
  }
  return horarios;
}

function carregarHorarios() {
  const container = document.getElementById("listaHorarios");
  container.innerHTML = "Carregando...";

  fetch(`https://script.google.com/macros/s/AKfycbyfRPXOwc_5o3KjPDY6usuuKYW_dAINMLjnlYhGryzdBoDhOJh8lF3Nm8I-RUIwf9f6/exec?action=horarios&data=${dataStr}`)
    .then(r => r.json())
    .then(horariosLivres => {
      container.innerHTML = "";

      const todos = gerarHorarios();

      todos.forEach(h => {
        const livre = horariosLivres.includes(h);

        const col = document.createElement("div");
        col.className = "col-6 col-md-3";

        col.innerHTML = `
          <div class="card hora-card ${livre ? "" : "ocupado"}">
            <div class="card-body text-center">
              <div class="hora">${h}</div>
              <small>${livre ? "Disponível" : "Ocupado"}</small>
            </div>
          </div>
        `;

        container.appendChild(col);
      });
    });
}

function voltar() {
  window.location.href = "home.html";
}

carregarHorarios();
</script>

</body>
</html>
