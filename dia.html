<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Reservar Horários</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }
    .horario {
      padding: 10px;
      border-radius: 6px;
      background: #fff;
      border: 1px solid #dee2e6;
      cursor: pointer;
    }
    .horario:hover {
      background: #e9ecef;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <button class="btn btn-outline-light btn-sm" onclick="voltar()">Voltar</button>
    <span class="navbar-brand">Horários do Dia</span>
  </div>
</nav>

<div class="container mt-4">

  <h5 id="tituloData" class="mb-3"></h5>

  <div id="horarios" class="mb-4">
    Carregando horários...
  </div>

  <div class="card">
    <div class="card-body">

      <div class="mb-3">
        <label class="form-label">Nome</label>
        <input type="text" id="nome" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">ID</label>
        <input type="text" id="id" class="form-control">
      </div>

      <button class="btn btn-primary w-100" onclick="confirmar()">Confirmar Reserva</button>

    </div>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const dataISO = params.get("data");

if (!dataISO) {
  alert("Data inválida");
}

const dataBR = dataISO.split("-").reverse().join("/");
document.getElementById("tituloData").innerText = "Data: " + dataBR;

const API = "https://script.google.com/macros/s/AKfycbyfRPXOwc_5o3KjPDY6usuuKYW_dAINMLjnlYhGryzdBoDhOJh8lF3Nm8I-RUIwf9f6/exec"; // ← COLE A URL /exec

function carregarHorarios() {
  fetch(`${API}?action=horarios&data=${dataISO}`)
    .then(r => r.json())
    .then(horarios => {
      const div = document.getElementById("horarios");
      div.innerHTML = "";

      if (!horarios || horarios.length === 0) {
        div.innerHTML = "<p>Nenhum horário disponível</p>";
        return;
      }

      horarios.forEach(h => {
        const label = document.createElement("label");
        label.className = "horario d-block mb-2";

        label.innerHTML = `
          <input type="checkbox" value="${h}">
          <span class="ms-2">${h}</span>
        `;

        div.appendChild(label);
      });
    })
    .catch(() => {
      document.getElementById("horarios").innerText =
        "Erro ao carregar horários";
    });
}

function confirmar() {
  const selecionados = [...document.querySelectorAll("#horarios input:checked")]
    .map(cb => cb.value);

  if (selecionados.length === 0) {
    alert("Selecione pelo menos um horário");
    return;
  }

  const dados = {
    action: "reservar",
    data: dataISO,
    horarios: selecionados,
    nome: document.getElementById("nome").value,
    id: document.getElementById("id").value
  };

  fetch(API, {
    method: "POST",
    body: JSON.stringify(dados)
  })
  .then(r => r.json())
  .then(res => {
    if (res.sucesso) {
      alert("Reserva realizada");
      window.location.href = "home.html";
    } else {
      alert(res.msg || "Erro");
      carregarHorarios();
    }
  });
}

function voltar() {
  window.location.href = "home.html";
}

carregarHorarios();
</script>

</body>
</html>
