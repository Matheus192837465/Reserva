<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard de Reservas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand">Reservas - Agenda Pública</span>
  </div>
</nav>

<div class="container mt-4">
  <h5 class="mb-3">Horários Reservados</h5>

  <table class="table table-striped table-bordered">
    <thead class="table-dark">
      <tr>
        <th>Data</th>
        <th>Hora</th>
        <th>Reservado por</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyfRPXOwc_5o3KjPDY6usuuKYW_dAINMLjnlYhGryzdBoDhOJh8lF3Nm8I-RUIwf9f6/exec";

fetch(API + "?action=dashboard")
  .then(r => r.json())
  .then(dados => {
    const tbody = document.getElementById("lista");

    if (dados.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="3" class="text-center text-muted">
            Nenhuma reserva futura
          </td>
        </tr>`;
      return;
    }

    dados.forEach(l => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${l[1]}</td>
        <td>${l[2]}</td>
        <td>${l[3]}</td>
      `;
      tbody.appendChild(tr);
    });
  });
</script>

</body>
</html>
