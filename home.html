<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
      margin: 0;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 250px;
      height: 100vh;
      background: #0d6efd;
      color: #fff;
      padding: 20px;
    }

    .sidebar h4 {
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      color: #fff;
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.2);
    }

    /* CONTEÚDO */
    .content {
      margin-left: 270px;
      padding: 30px;
    }

    .card-dia {
      cursor: pointer;
      transition: 0.2s;
    }

    .card-dia:hover {
      transform: scale(1.02);
    }

    .dia-nome {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .dia-data {
      color: #6c757d;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>Reservas</h4>

  <a href="home.html">Nova reserva</a>
  <a href="agenda.html">Agenda geral</a>
  <a href="#" onclick="logout()">Sair</a>
</div>

<!-- CONTEÚDO -->
<div class="content">
  <h5 class="mb-4">Semana atual</h5>

  <div class="row gy-3" id="dias"></div>
</div>

<script>
function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}

/* SEM toISOString (causa dia errado) */
function formatarISO(d) {
  const ano = d.getFullYear();
  const mes = String(d.getMonth() + 1).padStart(2, '0');
  const dia = String(d.getDate()).padStart(2, '0');
  return `${ano}-${mes}-${dia}`;
}

function obterSemana() {
  const hoje = new Date();
  const dias = [];

  const segunda = new Date(hoje);
  segunda.setDate(hoje.getDate() - hoje.getDay() + 1);

  for (let i = 0; i < 6; i++) {
    const d = new Date(segunda);
    d.setDate(segunda.getDate() + i);
    dias.push(d);
  }

  return dias;
}

function renderizarHome() {
  const container = document.getElementById("dias");
  container.innerHTML = "";

  const semana = obterSemana();

  semana.forEach(d => {
    const dataISO = formatarISO(d);
    const nomeDia = d.toLocaleDateString("pt-BR", { weekday: "long" })
      .replace("-feira", "")
      .toUpperCase();

    const dataBR = d.toLocaleDateString("pt-BR");

    const col = document.createElement("div");
    col.className = "col-12";

    col.innerHTML = `
      <div class="card card-dia shadow-sm" onclick="abrirDia('${dataISO}')">
        <div class="card-body">
          <div class="dia-nome">${nomeDia}</div>
          <div class="dia-data">${dataBR}</div>
          <div class="text-success mt-2">Selecionar horários</div>
        </div>
      </div>
    `;

    container.appendChild(col);
  });
}

function abrirDia(data) {
  window.location.href = `dia.html?data=${data}`;
}

renderizarHome();
</script>

</body>
</html>
