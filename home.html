<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
      overflow-x: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      height: 100vh;
      position: fixed;
      background: #0d6efd;
      color: white;
      padding: 20px;
    }

    .sidebar h5 {
      margin-bottom: 30px;
    }

    .sidebar a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.2);
    }

    /* CONTEÚDO */
    .content {
      margin-left: 260px;
      padding: 30px;
    }

    .dia {
      background: white;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      border: 1px solid #dee2e6;
      transition: 0.2s;
    }

    .dia:hover {
      background: #e9ecef;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h5>Sistema de Reservas</h5>

  <a href="home.html">Reservar Horário</a>
  <a href="agenda.html">Agenda Geral</a>
  <a href="#" onclick="sair()">Sair</a>
</div>

<!-- CONTEÚDO -->
<div class="content">

  <h4 class="mb-4">Selecione um dia</h4>

  <div class="row" id="dias">
    Carregando dias...
  </div>

</div>

<script>
function sair() {
  localStorage.clear();
  window.location.href = "index.html";
}

function gerarDias() {
  const container = document.getElementById("dias");
  container.innerHTML = "";

  const hoje = new Date();

  for (let i = 0; i < 14; i++) {
    const data = new Date(hoje);
    data.setDate(hoje.getDate() + i);

    const iso = data.toISOString().split("T")[0];
    const br = iso.split("-").reverse().join("/");

    const col = document.createElement("div");
    col.className = "col-6 col-md-3 mb-4";

    col.innerHTML = `
      <div class="dia" onclick="abrirDia('${iso}')">
        <strong>${br}</strong>
      </div>
    `;

    container.appendChild(col);
  }
}

function abrirDia(data) {
  window.location.href = `dia.html?data=${data}`;
}

gerarDias();
</script>

</body>
</html>
