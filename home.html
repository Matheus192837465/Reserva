<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Reservas | Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
      margin: 0;
    }
    .layout {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 240px;
      background: #0d6efd;
      color: #fff;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .sidebar a {
      color: #fff;
      text-decoration: none;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .sidebar a.active,
    .sidebar a:hover {
      background: rgba(255,255,255,.15);
    }
    .content {
      flex: 1;
      padding: 24px;
    }
    .card-dia {
      cursor: pointer;
      transition: transform .15s ease;
    }
    .card-dia:hover {
      transform: scale(1.02);
    }
    .dia-nome {
      font-weight: 600;
      font-size: 1.1rem;
      text-transform: capitalize;
    }
    .dia-data {
      color: #6c757d;
    }
  </style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h5 class="mb-4">Reservas</h5>

    <a href="home.html" class="active">Home</a>
    <a href="agenda.html">Agenda Geral</a>
    <a href="nova.html">Nova Reserva</a>

    <div class="mt-auto">
      <button class="btn btn-light w-100 btn-sm" onclick="logout()">Sair</button>
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">
    <h5 class="mb-4">Semana Atual</h5>
    <div id="dias" class="row gy-3"></div>
  </div>

</div>

<script>
function obterSemana() {
  const hoje = new Date();
  const segunda = new Date(hoje);
  const diff = hoje.getDay() === 0 ? -6 : 1 - hoje.getDay();
  segunda.setDate(hoje.getDate() + diff);
  segunda.setHours(12,0,0,0);

  const dias = [];
  for (let i = 0; i < 6; i++) {
    const d = new Date(segunda);
    d.setDate(segunda.getDate() + i);
    dias.push(d);
  }
  return dias;
}

function nomeDia(d) {
  return d.toLocaleDateString("pt-BR", { weekday: "long" });
}

function formatarData(d) {
  return d.toLocaleDateString("pt-BR");
}

function renderizarHome() {
  const container = document.getElementById("dias");
  container.innerHTML = "";

  obterSemana().forEach(d => {
    const dataISO = d.toISOString().slice(0,10);

    container.innerHTML += `
      <div class="col-12">
        <div class="card card-dia shadow-sm" onclick="abrirDia('${dataISO}')">
          <div class="card-body">
            <div class="dia-nome">${nomeDia(d)}</div>
            <div class="dia-data">${formatarData(d)}</div>
            <div class="text-success mt-2">Ver horários</div>
          </div>
        </div>
      </div>
    `;
  });
}

function abrirDia(data) {
  window.location.href = "dia.html?data=" + data;
}

function logout() {
  window.location.href = "index.html";
}

renderizarHome();
</script>

</body>
</html>
