<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Reservas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }
    .card-dia {
      cursor: pointer;
      transition: transform .2s;
    }
    .card-dia:hover {
      transform: scale(1.02);
    }
    .dia-nome {
      font-size: 1.2rem;
      font-weight: 600;
    }
    .dia-data {
      color: #6c757d;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand">Reservas</span>
  </div>
</nav>

<div class="container mt-4">
  <h5 class="mb-3">Semana atual</h5>
  <div id="dias" class="row gy-3"></div>
</div>

<script>
/* OBTÉM SEGUNDA A SÁBADO DA SEMANA ATUAL */
function obterSemana() {
  const hoje = new Date();
  const dias = [];

  const inicioSemana = new Date(hoje);
  inicioSemana.setDate(hoje.getDate() - hoje.getDay() + 1);

  for (let i = 0; i < 6; i++) {
    const d = new Date(inicioSemana);
    d.setDate(inicioSemana.getDate() + i);
    dias.push(d);
  }
  return dias;
}

function formatarData(d) {
  return d.toLocaleDateString("pt-BR");
}

function nomeDia(d) {
  return d
    .toLocaleDateString("pt-BR", { weekday: "long" })
    .replace("-feira", "")
    .toUpperCase();
}

/* RENDERIZA HOME */
function renderizarHome() {
  const container = document.getElementById("dias");
  container.innerHTML = "";

  const semana = obterSemana();

  semana.forEach(d => {
    const dataISO = d.toISOString().slice(0, 10);

    const col = document.createElement("div");
    col.className = "col-12";

    col.innerHTML = `
      <div class="card card-dia shadow-sm" data-data="${dataISO}">
        <div class="card-body">
          <div class="dia-nome">${nomeDia(d)}</div>
          <div class="dia-data">${formatarData(d)}</div>
          <div class="text-success mt-2">Horários disponíveis</div>
        </div>
      </div>
    `;

    col.querySelector(".card-dia").addEventListener("click", () => {
      abrirDia(dataISO);
    });

    container.appendChild(col);
  });
}

function abrirDia(data) {
  window.location.href = "horarios.html?data=" + data;
}

renderizarHome();
</script>

</body>
</html>
