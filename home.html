<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Home - Reservas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }

    .sidebar {
      width: 230px;
      height: 100vh;
      position: fixed;
      background: #0d6efd;
      color: white;
      padding: 20px;
    }

    .sidebar a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 5px;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.15);
    }

    .content {
      margin-left: 250px;
      padding: 20px;
    }

    .card-dia {
      cursor: pointer;
      transition: transform .2s;
    }

    .card-dia:hover {
      transform: scale(1.02);
    }

    .dia-nome {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .dia-data {
      color: #6c757d;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h5 class="mb-4">Sistema</h5>
  <a href="home.html">Home</a>
  <a href="agenda.html">Agenda Geral</a>
  <a href="#" onclick="novaReserva()">Nova Reserva</a>
  <hr>
  <a href="index.html">Sair</a>
</div>

<div class="content">
  <h5 class="mb-3">Semana Atual</h5>
  <div id="dias" class="row gy-3"></div>
</div>

<script>
function obterSemana() {
  const hoje = new Date();
  const dias = [];

  for (let i = 1; i <= 6; i++) {
    const d = new Date(hoje);
    d.setDate(hoje.getDate() - hoje.getDay() + i);
    d.setHours(12,0,0,0);
    dias.push(d);
  }
  return dias;
}

function formatarData(d) {
  return d.toLocaleDateString("pt-BR");
}

function nomeDia(d) {
  return d.toLocaleDateString("pt-BR", { weekday: "long" })
    .replace("-feira", "")
    .toUpperCase();
}

function abrirDia(data) {
  window.location.href = "dia.html?data=" + data;
}

function novaReserva() {
  const hoje = new Date();
  hoje.setHours(12,0,0,0);
  const data = hoje.toISOString().slice(0,10);
  abrirDia(data);
}

function renderizarHome() {
  const container = document.getElementById("dias");
  container.innerHTML = "";

  obterSemana().forEach(d => {
    const dataISO = d.toISOString().slice(0,10);

    container.innerHTML += `
      <div class="col-12">
        <div class="card card-dia shadow-sm" onclick="abrirDia('${dataISO}')">
          <div class="card-body">
            <div class="dia-nome">${nomeDia(d)}</div>
            <div class="dia-data">${formatarData(d)}</div>
            <div class="text-success mt-2">Ver horários</div>
          </div>
        </div>
      </div>
    `;
  });
}

renderizarHome();
</script>

</body>
</html>
