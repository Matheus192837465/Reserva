<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Reservas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }
    .card-dia {
      cursor: pointer;
      transition: transform .15s;
    }
    .card-dia:hover {
      transform: scale(1.02);
    }
    .dia-nome {
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .dia-data {
      color: #6c757d;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand">Reservas</span>
    <button class="btn btn-outline-light btn-sm" onclick="logout()">Sair</button>
  </div>
</nav>

<div class="container mt-4">
  <h5 class="mb-3">Semana Atual</h5>
  <div id="dias" class="row gy-3"></div>
</div>

<script>
function obterSemanaAtual() {
  const hoje = new Date();
  const dias = [];

  // força data local sem UTC
  const hojeLocal = new Date(
    hoje.getFullYear(),
    hoje.getMonth(),
    hoje.getDate()
  );

  // segunda (1) até sábado (6)
  for (let i = 1; i <= 6; i++) {
    const d = new Date(hojeLocal);
    d.setDate(hojeLocal.getDate() - hojeLocal.getDay() + i);
    dias.push(d);
  }

  return dias;
}

function nomeDia(d) {
  return d.toLocaleDateString("pt-BR", { weekday: "long" })
    .replace("-feira", "");
}

function formatarData(d) {
  return d.toLocaleDateString("pt-BR");
}

function isoDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

function renderizarDias() {
  const container = document.getElementById("dias");
  container.innerHTML = "";

  const semana = obterSemanaAtual();

  semana.forEach(d => {
    const col = document.createElement("div");
    col.className = "col-12";

    col.innerHTML = `
      <div class="card card-dia shadow-sm" onclick="abrirDia('${isoDate(d)}')">
        <div class="card-body">
          <div class="dia-nome">${nomeDia(d)}</div>
          <div class="dia-data">${formatarData(d)}</div>
        </div>
      </div>
    `;

    container.appendChild(col);
  });
}

function abrirDia(data) {
  window.location.href = `dia.html?data=${data}`;
}

function logout() {
  window.location.href = "index.html";
}

renderizarDias();
</script>

</body>
</html>
