<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Reservas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }
    .card-dia {
      cursor: pointer;
      transition: transform .2s;
    }
    .card-dia:hover {
      transform: scale(1.02);
    }
    .dia-nome {
      font-size: 1.2rem;
      font-weight: 600;
    }
    .dia-data {
      color: #6c757d;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand">Reservas</span>
  </div>
</nav>

<div class="container mt-4">
  <h5 class="mb-3">Semana atual</h5>
  <div id="dias" class="row gy-3"></div>
</div>

<script>
function obterSemana() {
  const hoje = new Date();
  const dias = [];

  for (let i = 1; i <= 6; i++) {
    const d = new Date(hoje);
    d.setDate(hoje.getDate() - hoje.getDay() + i);
    dias.push(d);
  }
  return dias;
}

function formatarData(d) {
  return d.toLocaleDateString("pt-BR");
}

function nomeDia(d) {
  return d.toLocaleDateString("pt-BR", { weekday: "long" })
    .replace("-feira", "")
    .toUpperCase();
}

function renderizarHome() {
  const container = document.getElementById("dias");
  const semana = obterSemana();

  semana.forEach(d => {
    const col = document.createElement("div");
    col.className = "col-12";

    const card = document.createElement("div");
    card.className = "card card-dia shadow-sm";

    card.addEventListener("click", () => {
      const data = d.toISOString().slice(0,10);
      window.location.href = "horarios.html?data=" + data;
    });

    card.innerHTML = `
      <div class="card-body">
        <div class="dia-nome">${nomeDia(d)}</div>
        <div class="dia-data">${formatarData(d)}</div>
        <div class="text-success mt-2">Horários disponíveis</div>
      </div>
    `;

    col.appendChild(card);
    container.appendChild(col);
  });
}

renderizarHome();
</script>

</body>
</html>
